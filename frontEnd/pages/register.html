<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoGet – Cadastro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <h1><i class="fa-solid fa-leaf"></i> EcoGet</h1>
            <p>Criar nova conta</p>
        </div>

        <div id="alert" class="alert" style="display:none;"></div>

        <form id="form">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="nome" placeholder="Seu nome" required autofocus>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirmar senha</label>
                    <input type="password" id="senhaRepeticao" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="btn-submit">Cadastrar</button>
        </form>

        <div class="auth-link">
            Já tem conta? <a href="../index.html">Entrar</a>
        </div>
    </div>

    <script src="../script/api.js"></script>
    <script>
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertEl = document.getElementById('alert');
            const btn     = document.getElementById('btn-submit');
            alertEl.style.display = 'none';
            btn.textContent = 'Cadastrando...';
            btn.disabled    = true;

            const res = await Api.postPublic('/api/v1/usuarios', {
                nome:           document.getElementById('nome').value,
                email:          document.getElementById('email').value,
                senha:          document.getElementById('senha').value,
                senhaRepeticao: document.getElementById('senhaRepeticao').value,
            });

            btn.textContent = 'Cadastrar';
            btn.disabled    = false;

            if (res && (res.ok || res.status === 201)) {
                alertEl.className   = 'alert alert-success';
                alertEl.textContent = 'Conta criada com sucesso! Redirecionando...';
                alertEl.style.display = 'block';
                setTimeout(() => window.location.href = '../index.html', 1500);
            } else {
                const msg = res ? await res.text() : 'Sem conexão com a API.';
                alertEl.className   = 'alert alert-danger';
                alertEl.textContent = msg || 'Erro ao criar conta.';
                alertEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
